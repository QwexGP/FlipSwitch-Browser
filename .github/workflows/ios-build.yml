name: build-ios

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust iOS targets
        run: rustup target add aarch64-apple-ios

      - name: Flutter pub get
        run: flutter pub get

      - name: Build rust_core (iOS)
        run: |
          cargo build --release --manifest-path rust_core/Cargo.toml --target aarch64-apple-ios
          mkdir -p ios/libs
          cp rust_core/target/aarch64-apple-ios/release/librust_core.a ios/libs/librust_core.a

      - name: Xcode Build (Manual Bypass)
        run: |
          # Сначала готовим файлы проекта
          flutter build ios --release --no-codesign --config-only
          
          # Собираем напрямую через Xcode, игнорируя подпись
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            build

      - name: Package IPA (unsigned)
        run: |
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Ошибка: .app файл не найден!"
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r FlipSwitch.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlipSwitch-unsigned-ipa
          path: FlipSwitch.ipa