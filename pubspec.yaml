name: br
description: "FlipSwitch Browser - Private & Anti-detect"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_inappwebview: ^6.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  flutter_animate: ^4.5.2
  ffi: ^2.1.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Фиксируем версии без ^, чтобы избежать конфликта с макросами Dart
  hive_generator: 2.0.1
  build_runner: 2.4.13

flutter:
  uses-material-design: true