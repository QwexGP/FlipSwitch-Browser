name: build-ios

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust iOS targets
        run: rustup target add aarch64-apple-ios

      - name: Flutter pub get
        run: flutter pub get

      - name: Build rust_core (iOS)
        run: |
          if [ -f rust_core/Cargo.toml ]; then
            cargo build --release --manifest-path rust_core/Cargo.toml --target aarch64-apple-ios
            mkdir -p ios/libs
            cp rust_core/target/aarch64-apple-ios/release/librust_core.a ios/libs/librust_core.a
          else
            echo "Error: rust_core/Cargo.toml not found!"
            exit 1
          fi

      - name: Build iOS (No CodeSign)
        run: |
          flutter build ios --release --no-codesign \
            --extra-gen-snapshot-options="--no-codesign" \
            --extra-front-end-options="--no-codesign"
        env:
          EXPANDED_CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"

      - name: Package IPA (unsigned)
        run: |
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Runner.app not found!"
            ls -R build/ios/iphoneos
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r FlipSwitch.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlipSwitch-unsigned-ipa
          path: FlipSwitch.ipa