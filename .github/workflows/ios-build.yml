name: build-ios

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust iOS targets
        run: rustup target add aarch64-apple-ios

      - name: Flutter pub get
        run: flutter pub get

      - name: Build rust_core (iOS)
        run: |
          cargo build --release --manifest-path rust_core/Cargo.toml --target aarch64-apple-ios
          mkdir -p ios/libs
          cp rust_core/target/aarch64-apple-ios/release/librust_core.a ios/libs/librust_core.a

      - name: Patch Xcode Project (Disable Signing)
        # Этот шаг заменяет настройки подписи прямо в файле проекта на "не требуется"
        run: |
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Xcode Build (Manual Bypass)
        run: |
          # Готовим окружение
          flutter build ios --release --no-codesign --config-only
          
          # Чистим и собираем через xcodebuild
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            clean build

      - name: Package IPA (unsigned)
        run: |
          # Ищем .app в папке DerivedData или стандартной build
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Runner.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build/ios/iphoneos -name "*.app" -type d | head -n 1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "Ошибка: .app не найден ни в DerivedData, ни в build."
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r FlipSwitch.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlipSwitch-unsigned-ipa
          path: FlipSwitch.ipa